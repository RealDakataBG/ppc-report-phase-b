<!doctype html><html lang="de"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Digitallagune – Admin</title>
<link rel="icon" href="assets/logo.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-page">

<aside class="sidebar">
  <div class="sidebar-actions">
    <a class="side-btn side-btn-secondary" href="admin.html">Übersicht</a>
    <button class="side-btn side-btn-primary" id="invite-open-btn" type="button">+ Neuer Kunde</button>
    <button class="side-btn side-btn-secondary" id="sync-btn" type="button">To-dos jetzt synchronisieren</button>
  </div>
  <div class="sidebar-label">Kunden</div>
  <div class="sidebar-clients" id="sidebar-clients"></div>
</aside>

<div class="authbar">
  <div class="authbar-in">
    <span class="authbar-who" id="authbar-who"></span>
    <span class="authbar-spacer"></span>
    <button class="link-btn" id="logout-btn">Abmelden</button>
  </div>
</div>

<div id="overview-root" class="admin-main"></div>

<div class="landing admin-main" style="min-height:auto;padding:50px 20px;">
  <div class="landing-in">
    <div class="landing-error" id="sync-error"></div>
    <div class="landing-success" id="sync-success"></div>

    <img class="landing-logo" src="assets/logo.jpg" alt="Digitallagune">
    <h1>Admin</h1>
    <p class="lead">Lade den monatlichen Daten-Export hoch. Kunden werden automatisch angelegt und aktualisiert.</p>

    <div class="dropgrid">
      <div class="dropzone" id="dz-data">
        <div class="dz-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="3.5" width="17" height="17" rx="3"/><path d="M8 16v-4M12 16V8M16 16v-6.5"/></svg></div>
        <div class="dz-title">Daten-Export</div>
        <div class="dz-sub">.xlsx mit Entity / Month / Impressions / Spend / Revenue …</div>
        <div class="dz-file" id="dz-data-file"></div>
        <input type="file" id="file-data" accept=".xlsx,.xls">
      </div>
    </div>

    <button class="gen-btn" id="upload-btn" disabled>Hochladen</button>
    <div class="landing-error" id="upload-error"></div>
    <div id="upload-result"></div>
  </div>
</div>

<div class="modal-backdrop" id="invite-backdrop">
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="invite-modal-title">
    <button class="modal-close" id="invite-close" type="button" aria-label="Schließen">&times;</button>
    <h2 class="modal-title" id="invite-modal-title">Neuer Kunde</h2>
    <p class="modal-sub">E-Mail einladen und mit einer Firma verknüpfen.</p>
    <form id="invite-form">
      <div class="field">
        <label for="invite-email">E-Mail-Adresse</label>
        <input type="email" id="invite-email" autocomplete="off" required placeholder="name@firma.de">
      </div>
      <div class="field combobox" id="invite-company-combobox">
        <label for="invite-company">Firma</label>
        <input type="text" id="invite-company" autocomplete="off" required placeholder="Firmenname suchen oder neu anlegen">
        <ul class="combobox-list" id="invite-company-list"></ul>
      </div>
      <button class="gen-btn" id="invite-submit" type="submit">Einladen</button>
    </form>
    <div class="landing-error" id="invite-error"></div>
    <div class="landing-success" id="invite-success"></div>
  </div>
</div>

<script src="js/report-builder.js"></script>
<script type="module" src="js/admin.js"></script>
</body></html>
