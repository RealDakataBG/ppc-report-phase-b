<!doctype html><html lang="de"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Digitallagune – Amazon PPC Dashboard</title>
<link rel="icon" href="assets/logo.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="landing" id="landing">
  <div class="landing-in">
    <img class="landing-logo" src="assets/logo.jpg" alt="Digitallagune">
    <h1>Amazon PPC Dashboard</h1>
    <p class="lead">Melde dich mit deiner E-Mail-Adresse an. Wir senden dir einen Login-Link – kein Passwort nötig.</p>

    <form id="login-form">
      <div class="field">
        <label for="email">E-Mail-Adresse</label>
        <input type="email" id="email" name="email" autocomplete="email" required placeholder="name@firma.de">
      </div>
      <button class="gen-btn" id="login-btn" type="submit">Login-Link senden</button>
    </form>
    <div class="landing-note">Nur eingeladene Konten können sich anmelden.</div>
    <div class="landing-success" id="login-success"></div>
    <div class="landing-error" id="login-error"></div>
  </div>
</div>

<script type="module" src="js/login.js"></script>
</body></html>
